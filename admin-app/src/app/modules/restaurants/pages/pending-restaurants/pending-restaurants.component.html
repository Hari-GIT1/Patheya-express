<div class="page-header">

    <div>
  
      <h1>
        Pending Restaurants
      </h1>
  
      <p>
        Review and approve restaurants
      </p>
  
    </div>
  
  </div>
  
  <div class="restaurant-grid">
  
    <div
  
      *ngFor="
        let restaurant of restaurants
      "
  
      class="restaurant-card"
  
    >
  
      <div>
  
        <h3>
  
          {{ restaurant.name }}
  
        </h3>
  
        <p>
  
          {{ restaurant.city }}
  
        </p>
  
      </div>
  
      <button
  
        [routerLink]="[
          '/restaurants',
          restaurant._id
        ]"
  
      >
  
        Review
  
      </button>
  
    </div>
  
  </div>
