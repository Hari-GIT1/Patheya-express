
<div class="dashboard-card">

    <div class="card-header">
  
      <h3>Recent Orders</h3>
  
    </div>
  
    <div
      *ngFor="let order of orders"
      class="order-item"
    >
  
      <div>
  
        <h4>
  
          #{{ order._id
            | slice:0:8 }}
  
        </h4>
  
        <p>
  
          {{ order.status }}
  
        </p>
  
      </div>
  
      <span>
  
        ₹{{ order.totalAmount }}
  
      </span>
  
    </div>
  
  </div>
