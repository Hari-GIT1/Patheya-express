<div class="login-page">

    <div class="login-card">
  
      <h2>Patheya Admin</h2>
  
      <p class="subtitle">
        Login to continue
      </p>
  
      <form (ngSubmit)="onLogin()">
  
        <div class="form-group">
  
          <label>Email</label>
  
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            required
          />
  
        </div>
  
        <div class="form-group">
  
          <label>Password</label>
  
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            required
          />
  
        </div>
  
        <p
          class="error"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </p>
  
        <button
          type="submit"
          [disabled]="loading"
        >
  
          {{ loading
              ? 'Logging in...'
              : 'Login' }}
  
        </button>
  
      </form>
  
    </div>
  
  </div>
