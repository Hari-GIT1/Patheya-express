<div class="login-page">

    <div class="login-card">
  
      <h1>Patheya Admin</h1>
  
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Email"
      />
  
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Password"
      />
  
      <button (click)="login()">
  
        Login
  
      </button>
  
    </div>
  
  </div>
