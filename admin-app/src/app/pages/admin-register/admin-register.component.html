<div class="auth-container">

    <div class="auth-card">
  
      <h1>
        Create Admin
      </h1>
  
      <p>
        Register new admin
      </p>
  
      <form
        [formGroup]="registerForm"
        (ngSubmit)="onSubmit()"
      >
  
        <div class="form-group">
  
          <label>Name</label>
  
          <input
            type="text"
            formControlName="name"
            placeholder="Enter name"
          />
  
        </div>
  
        <div class="form-group">
  
          <label>Email</label>
  
          <input
            type="email"
            formControlName="email"
            placeholder="Enter email"
          />
  
        </div>
  
        <div class="form-group">
  
          <label>Password</label>
  
          <input
            type="password"
            formControlName="password"
            placeholder="Enter password"
          />
  
        </div>
  
        <div class="form-group">
  
          <label>Role</label>
  
          <select
            formControlName="role"
          >
  
            <option
              *ngFor="let role of roles"
              [value]="role"
            >
              {{ role }}
            </option>
  
          </select>
  
        </div>
  
        <div
          class="error"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </div>
  
        <button
          type="submit"
          [disabled]="loading"
        >
  
          {{
            loading
            ? 'Creating...'
            : 'Register'
          }}
  
        </button>
  
      </form>
  
      <div class="bottom-link">
  
        Already have account?
  
        <a routerLink="/login">
          Login
        </a>
  
      </div>
  
    </div>
  
  </div>
