<div class="admin-layout">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">

      <h2>Patheya</h2>

    </div>

    <nav class="nav-links">

      <a
        routerLink="/dashboard"
        routerLinkActive="active"
      >

        <i class="fas fa-chart-line"></i>

        <span>Dashboard</span>

      </a>

      <a
        routerLink="/orders"
        routerLinkActive="active"
      >

        <i class="fas fa-shopping-bag"></i>

        <span>Orders</span>

      </a>

      <a
        routerLink="/restaurants"
        routerLinkActive="active"
      >

        <i class="fas fa-store"></i>

        <span>Restaurants</span>

      </a>

      <a
        routerLink="/users"
        routerLinkActive="active"
      >

        <i class="fas fa-users"></i>

        <span>Users</span>

      </a>

      <a
        routerLink="/finance"
        routerLinkActive="active"
      >

        <i class="fas fa-wallet"></i>

        <span>Finance</span>

      </a>

      <a
        routerLink="/marketing"
        routerLinkActive="active"
      >

        <i class="fas fa-bullhorn"></i>

        <span>Marketing</span>

      </a>

      <a
        routerLink="/support"
        routerLinkActive="active"
      >

        <i class="fas fa-headset"></i>

        <span>Support</span>

      </a>

    </nav>

  </aside>

  <!-- MAIN -->

  <div class="main-layout">

    <!-- HEADER -->

    <header class="top-header">

      <div class="left">

        <h3>Admin Panel</h3>

      </div>

      <div class="right">

        <button
          class="logout-btn"
          (click)="logout()"
        >

          Logout

        </button>

      </div>

    </header>

    <!-- PAGE -->

    <main class="page-content">

      <router-outlet></router-outlet>

    </main>

  </div>

</div>
