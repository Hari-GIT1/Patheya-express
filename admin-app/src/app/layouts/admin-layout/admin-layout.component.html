<div class="admin-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
  
      <!-- LOGO -->
      <div class="sidebar-logo">
  
        <div class="logo-box">
  
          P
  
        </div>
  
        <div>
  
          <h3>
            Patheya
          </h3>
  
          <p>
            Admin Panel
          </p>
  
        </div>
  
      </div>
  
      <!-- MENU -->
      <nav class="sidebar-menu">
  
        <a
          *ngFor="
            let item of menuItems
          "
          [routerLink]="item.route"
          routerLinkActive="active-menu"
          class="menu-link"
        >
  
          <i [class]="item.icon"></i>
  
          <span>
  
            {{ item.label }}
  
          </span>
  
        </a>
  
      </nav>
  
      <!-- FOOTER -->
      <div class="sidebar-footer">
  
        <button
          class="logout-btn"
          (click)="logout()"
        >
  
          <i
            class="
              fas
              fa-sign-out-alt
            "
          ></i>
  
          Logout
  
        </button>
  
      </div>
  
    </aside>
  
    <!-- MAIN -->
    <div class="main-shell">
  
      <!-- TOPBAR -->
      <header class="topbar">
  
        <div class="topbar-search">

            <i
              class="
                fas
                fa-search
              "
            ></i>
          
            <input
              type="text"
              placeholder="
                Search orders,
                restaurants,
                users...
              "
            />
          
          </div>
  
          <div class="topbar-right">

            <button   class="command-btn"
            (click)="
              toggleCommandPalette()
            ">
          
              ⌘ K
          
            </button>
          
            <div class="live-pill">
          
              <span class="live-dot"></span>
          
              Live
          
            </div>
          
            <div class="admin-profile">
          
              H
          
            </div>
          
          </div>
  
      </header>
  
      <!-- CONTENT -->
      <main class="content-area">
  
        <router-outlet></router-outlet>
  
      </main>
  
    </div>
  
  </div>
  <!-- COMMAND PALETTE -->
<div

class="command-overlay"

*ngIf="
  showCommandPalette
"

(click)="
  closeCommandPalette()
"

>

<div

  class="command-modal"

  (click)="
    $event.stopPropagation()
  "

>

  <!-- SEARCH -->
  <div class="command-search">

    <i
      class="
        fas
        fa-search
      "
    ></i>

    <input
      type="text"
      placeholder="
        Search anything...
      "
      autofocus
    />

  </div>

  <!-- RESULTS -->
  <div class="command-results">

    <a
      routerLink="/dashboard"
      (click)="
        closeCommandPalette()
      "
    >

      <i
        class="
          fas
          fa-chart-line
        "
      ></i>

      Dashboard

    </a>

    <a
      routerLink="/orders"
      (click)="
        closeCommandPalette()
      "
    >

      <i
        class="
          fas
          fa-shopping-bag
        "
      ></i>

      Orders

    </a>

    <a
      routerLink="/restaurants"
      (click)="
        closeCommandPalette()
      "
    >

      <i
        class="
          fas
          fa-store
        "
      ></i>

      Restaurants

    </a>

    <a
      routerLink="/users"
      (click)="
        closeCommandPalette()
      "
    >

      <i
        class="
          fas
          fa-users
        "
      ></i>

      Users

    </a>

  </div>

</div>

</div>
