<div class="deliveries-page">

    <!-- HEADER -->
    <div class="page-header">
  
      <div>
  
        <h2 class="fw-bold mb-1">
  
          Active Deliveries 🚚
  
        </h2>
  
        <p class="text-muted mb-0">
  
          Manage ongoing orders
  
        </p>
  
      </div>
  
      <div class="live-chip">
  
        {{ orders.length }}
  
        Active
  
      </div>
  
    </div>
  
    <!-- EMPTY -->
    <div
      *ngIf="!orders.length"
      class="empty-box"
    >
  
      <i class="bi bi-truck"></i>
  
      <h5>
  
        No Active Deliveries
  
      </h5>
  
      <p>
  
        Accepted orders will
        appear here
  
      </p>
  
    </div>
  
    <!-- DELIVERY CARD -->
    <div
  
      *ngFor="let order of orders"
  
      class="delivery-card"
  
    >
  
      <!-- TOP -->
      <div class="d-flex justify-content-between align-items-start mb-3">
  
        <div>
  
          <h5 class="fw-bold mb-1">
  
            Customer Delivery
  
          </h5>
  
          <p class="text-muted mb-0">
  
            Order #
            {{ order._id.slice(-6) }}
  
          </p>
  
        </div>
  
        <span
          class="status-chip"
        >
  
          {{ order.status }}
  
        </span>
  
      </div>
  
      <!-- ADDRESS -->
      <div class="address-box">
  
        <div class="mb-3">
  
          <small class="text-muted">
  
            Delivery Address
  
          </small>
  
          <p class="mb-0 fw-semibold">
  
            {{ order.address }}
  
          </p>
  
        </div>
  
      </div>
  
      <!-- ITEMS -->
      <div class="items-row">
  
        <span>
  
          {{ order.items.length }}
          Items
  
        </span>
  
        <strong>
  
          ₹ {{ order.total }}
  
        </strong>
  
      </div>
  
      <!-- ACTIONS -->
      <div class="row g-2 mt-3">
  
        <!-- MAP -->
        <div class="col-6">
  
          <button
            class="btn nav-btn w-100"

            [routerLink]="[
            '/live-delivery',
            order._id
            ]"
          >
  
            <i class="bi bi-map"></i>
  
            Navigate
  
          </button>
  
        </div>
  
        <!-- STATUS -->
        <div class="col-6">
  
          <button
  
            *ngIf="
              order.status !==
              'delivered'
            "
  
            class="btn delivered-btn w-100"
  
            (click)="markDelivered(order._id)"
  
          >
  
            Delivered
  
          </button>
  
        </div>
  
      </div>
  
    </div>
  
  </div>
