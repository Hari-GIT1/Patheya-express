<div class="orders-page">

    <!-- HEADER -->
    <div class="page-header">
  
      <div>
  
        <h2 class="fw-bold mb-1">
  
          Available Orders 🍔
  
        </h2>
  
        <p class="text-muted mb-0">
  
          Nearby delivery opportunities
  
        </p>
  
      </div>
  
      <!-- LIVE COUNT -->
      <div class="live-chip">
  
        {{ orders.length }}
  
        Live
  
      </div>
  
    </div>
  
    <!-- EMPTY -->
    <div
      *ngIf="!orders.length"
      class="empty-box"
    >
  
      <i class="bi bi-bag-x"></i>
  
      <h5>
  
        No Orders Available
  
      </h5>
  
      <p>
  
        New delivery requests
        will appear here
  
      </p>
  
    </div>
  
    <!-- ORDER CARDS -->
    <div
      *ngFor="let order of orders"
      class="order-card"
    >
  
      <!-- TOP -->
      <div class="d-flex justify-content-between align-items-start mb-3">
  
        <div>
  
          <h5 class="fw-bold mb-1">
  
            Restaurant Order
  
          </h5>
  
          <p class="text-muted mb-0">
  
            {{ order.items.length }}
            items
  
          </p>
  
        </div>
  
        <span class="earning-chip">
  
          ₹ {{ order.total }}
  
        </span>
  
      </div>
  
      <!-- DISTANCE -->
      <div class="info-box">
  
        <div>
  
          <i class="bi bi-geo-alt"></i>
  
          Pickup:
          2.1 km
  
        </div>
  
        <div>
  
          <i class="bi bi-truck"></i>
  
          Delivery:
          4.5 km
  
        </div>
  
      </div>
  
      <!-- ITEMS -->
      <div class="items-preview">
  
        <span
          *ngFor="
            let item of order.items
          "
        >
  
          {{ item.name }}
  
        </span>
  
      </div>
  
      <!-- TIMER -->
      <div class="timer-row">
  
        <i class="bi bi-clock"></i>
  
        <span>
  
          Expires in 02:45
  
        </span>
  
      </div>
  
      <!-- ACTION -->
      <button
  
        class="btn accept-btn w-100"
  
        (click)="acceptOrder(order._id)"
  
      >
  
        Accept Order
  
      </button>
  
    </div>
  
  </div>
