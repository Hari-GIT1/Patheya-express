<div class="auth-page">

    <div class="container">
  
      <div class="row justify-content-center align-items-center min-vh-100">
  
        <div class="col-lg-4 col-md-6">
  
          <div class="auth-card">
  
            <!-- LOGO -->
            <div class="text-center mb-4">
  
              <div class="brand-logo">
  
                🛵
  
              </div>
  
              <h2 class="fw-bold mt-3">
  
                Patheya Delivery
  
              </h2>
  
              <p class="text-muted">
  
                Rider Login
  
              </p>
  
            </div>
  
            <!-- FORM -->
            <form>
  
              <!-- PHONE -->
              <div class="mb-3">
  
                <label class="form-label">
  
                  Mobile Number
  
                </label>
  
                <input
  
                  type="text"
  
                  class="form-control custom-input"
  
                  placeholder="Enter mobile number"
  
                  [(ngModel)]="phone"
  
                  name="phone"
  
                >
  
              </div>
  
              <!-- PASSWORD -->
              <div class="mb-4">
  
                <label class="form-label">
  
                  Password
  
                </label>
  
                <input
  
                  type="password"
  
                  class="form-control custom-input"
  
                  placeholder="Enter password"
  
                  [(ngModel)]="password"
  
                  name="password"
  
                >
  
              </div>
  
              <!-- ERROR -->
              <div
                *ngIf="error"
                class="alert alert-danger"
              >
  
                {{ error }}
  
              </div>
  
              <!-- BUTTON -->
              <button
  
                type="button"
  
                class="btn login-btn w-100"
  
                [disabled]="loading"
  
                (click)="login()"
  
              >
  
                <span *ngIf="!loading">
  
                  Login
  
                </span>
  
                <span *ngIf="loading">
  
                  Please wait...
  
                </span>
  
              </button>
  
            </form>
  
            <!-- REGISTER -->
            <div class="text-center mt-4">
  
              <p class="mb-0">
  
                New Rider?
  
                <a
                  routerLink="/register"
                  class="register-link"
                >
  
                  Register Here
  
                </a>
  
              </p>
  
            </div>
  
          </div>
  
        </div>
  
      </div>
  
    </div>
  
  </div>
