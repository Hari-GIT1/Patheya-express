<div class="container-fluid mt-3">
  <div class="row">

    <!-- MENU -->
    <div class="col-lg-8">

      <h3 class="fw-bold mb-3">Menu 🍽️</h3>

      <div *ngFor="let item of menu" class="card mb-3 shadow-sm menu-card">

        <div class="card-body d-flex justify-content-between">

          <div>
            <h5>{{ item.name }}</h5>
            <p class="text-muted">₹ {{ item.price }}</p>

            <span class="badge"
              [ngClass]="item.category === 'veg' ? 'bg-success' : 'bg-danger'">
              {{ item.category }}
            </span>
          </div>

          <!-- ADD / QTY -->
          <div class="d-flex align-items-center">

            <div *ngIf="!item.quantity">
              <button class="btn btn-outline-primary"
                      (click)="addToCart(item)">
                ADD +
              </button>
            </div>

            <div *ngIf="item.quantity" class="d-flex gap-2 align-items-center">
              <button class="btn btn-sm btn-light"
                      (click)="decrease(item)">-</button>
              <span>{{ item.quantity }}</span>
              <button class="btn btn-sm btn-light"
                      (click)="increase(item)">+</button>
            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- CART -->
    <div class="col-lg-4">

      <div class="card p-3 sticky-top cart-box">

        <h5>Your Cart 🛒</h5>

        <div *ngIf="cartItems.length === 0" class="text-muted text-center">
          Cart is empty
        </div>

        <div *ngFor="let item of cartItems" class="mb-2">

          <div class="d-flex justify-content-between">

            <div>
              {{ item.name }}<br>
              ₹ {{ item.price }}
            </div>

            <div class="d-flex gap-2 align-items-center">
              <button (click)="decrease(item)">-</button>
              {{ item.quantity }}
              <button (click)="increase(item)">+</button>
            </div>

          </div>

        </div>

        <hr>

        <h5>Total: ₹ {{ total }}</h5>

        <button class="btn btn-success w-100"
                routerLink="/checkout">
          Checkout →
        </button>

      </div>

    </div>

  </div>
</div>
