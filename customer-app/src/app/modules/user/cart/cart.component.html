<div class="container mt-4">

    <h2 class="mb-3">Your Cart 🛒</h2>
  
    <div *ngFor="let item of cartItems" class="card p-3 mb-3 shadow-sm">
  
      <div class="d-flex justify-content-between align-items-center">
  
        <div>
          <h5>{{ item.name }}</h5>
          <p>₹ {{ item.price }}</p>
        </div>
  
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-danger" (click)="decrease(item)">-</button>
          <span>{{ item.quantity }}</span>
          <button class="btn btn-sm btn-success" (click)="increase(item)">+</button>
        </div>
  
      </div>
  
    </div>
  
    <h4>Total: ₹ {{ total }}</h4>
  
    <button class="btn btn-success mt-3 w-100" routerLink="/checkout">
      Proceed to Checkout
    </button>
  
  </div>
  <!-- STICKY CHECKOUT BAR -->
<div 
class="checkout-bar"
*ngIf="cartItems.length > 0"
>

<div class="d-flex justify-content-between align-items-center w-100">

  <div>
    <strong>₹ {{ total }}</strong>
    <div class="small text-muted">
      {{ cartItems.length }} items
    </div>
  </div>

  <button class="btn btn-light fw-bold" (click)="goToCheckout()">
    Proceed →
  </button>

</div>

</div>
