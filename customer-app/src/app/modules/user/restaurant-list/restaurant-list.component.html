<div class="container mt-4">
  <div class="row">

    <div *ngFor="let r of filteredRestaurants" class="col-md-4 mb-4">

      <div class="card restaurant-card h-100"
           (click)="goToDetails(r._id)"
           style="cursor:pointer">

        <!-- IMAGE -->
        <img [src]="r.image" class="card-img-top" alt="food">

        <div class="card-body">

          <h5 class="fw-bold mb-1">{{ r.name }}</h5>

          <p class="text-muted small mb-2">
            {{ r.cuisines.join(', ') }}
          </p>

          <div class="d-flex justify-content-between align-items-center">

            <span class="badge bg-success">
              ⭐ {{ r.rating }}
            </span>

            <small class="text-muted">
              ⏱ {{ r.deliveryTime }} mins
            </small>

          </div>

          <div class="mt-2">

            <span *ngIf="r.pickupAvailable" class="badge bg-warning text-dark">
              Pickup Available
            </span>

          </div>

        </div>

      </div>

    </div>

  </div>
</div>
