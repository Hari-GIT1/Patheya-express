<div class="login-page">

  <!-- ============================= -->
  <!-- LEFT -->
  <!-- ============================= -->

  <div class="login-left">

    <div class="overlay"></div>

    <div class="hero-content">

      <span class="tag">
        🍔 India's Fastest Food Delivery
      </span>

      <h1>
        Delicious food,
        delivered to your doorstep.
      </h1>

      <p>
        Discover restaurants, order instantly,
        and track deliveries in real time.
      </p>

      <div class="features">

        <div class="feature">

          ⚡ Fast Delivery

        </div>

        <div class="feature">

          🍽️ Top Restaurants

        </div>

        <div class="feature">

          📍 Live Tracking

        </div>

      </div>

    </div>

  </div>

  <!-- ============================= -->
  <!-- RIGHT -->
  <!-- ============================= -->

  <div class="login-right">

    <div class="login-card">

      <!-- BRAND -->
      <div class="brand">

        <h2>
          PatheyaExpress
        </h2>

        <p>
          Welcome back 👋
        </p>

      </div>

      <!-- ERROR -->
      <div
        *ngIf="error"
        class="error-box">

        {{ error }}

      </div>

      <!-- FORM -->
      <form (ngSubmit)="onSubmit()">

        <!-- EMAIL -->
        <div class="input-group-custom">

          <label>
            Email Address
          </label>

          <input

            type="email"

            placeholder="Enter your email"

            [(ngModel)]="email"

            name="email"

            required>

        </div>

        <!-- PASSWORD -->
        <div class="input-group-custom">

          <label>
            Password
          </label>

          <input

            type="password"

            placeholder="Enter your password"

            [(ngModel)]="password"

            name="password"

            required>

        </div>

        <!-- BUTTON -->
        <button

          class="login-btn"

          [disabled]="loading">

          <span *ngIf="!loading">
            Login →
          </span>

          <span *ngIf="loading">
            Please wait...
          </span>

        </button>

      </form>

      <!-- FOOTER -->
      <div class="auth-footer">

        <p>

          New to PatheyaExpress?

          <a routerLink="/auth/register">

            Create account

          </a>

        </p>

      </div>

    </div>

  </div>

</div>
