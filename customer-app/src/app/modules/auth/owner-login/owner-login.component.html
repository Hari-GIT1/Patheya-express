<div class="login-container">

    <div class="card login-card p-4 shadow">
  
      <h3 class="text-center mb-4">🍽 Owner Login</h3>
  
      <input 
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        class="form-control mb-3"
      >
  
      <input 
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        class="form-control mb-3"
      >
  
      <button class="btn btn-primary w-100" (click)="login()">
        Login
      </button>
  
    </div>
  
  </div>
