<div class="settings-page container-fluid py-4">

    <!-- HEADER -->
    <div class="settings-header mb-4">
  
      <div>
        <h2 class="page-title">
          ⚙️ Restaurant Settings
        </h2>
  
        <p class="page-subtitle">
          Manage restaurant profile & preferences
        </p>
      </div>
  
    </div>
  
    <div class="row g-4">
    <!-- LEFT -->
    <div class="col-lg-8">

        <div class="settings-card">
  
          <h4 class="section-title mb-4">
            Restaurant Information
          </h4>
  
          <div class="row g-4">
  
            <!-- RESTAURANT NAME -->
            <div class="col-md-6">
  
              <label class="form-label">
                Restaurant Name
              </label>
  
              <input
                type="text"
                class="modern-input"
                [(ngModel)]="settings.restaurantName">
  
            </div>

          <!-- PHONE -->
          <div class="col-md-6">

            <label class="form-label">
              Phone Number
            </label>

            <input
              type="text"
              class="modern-input"
              [(ngModel)]="settings.phone">

          </div>

          <!-- EMAIL -->
          <div class="col-md-6">

            <label class="form-label">
              Email
            </label>

            <input
              type="email"
              class="modern-input"
              [(ngModel)]="settings.email">

          </div>

          <!-- DELIVERY TIME -->
          <div class="col-md-6">

            <label class="form-label">
              Average Delivery Time
            </label>

            <input
              type="text"
              class="modern-input"
              placeholder="30 mins"
              [(ngModel)]="settings.deliveryTime">

          </div>

          <!-- ADDRESS -->
          <div class="col-12">

            <label class="form-label">
              Restaurant Address
            </label>

            <textarea
              rows="4"
              class="modern-input"
              [(ngModel)]="settings.address">
            </textarea>

          </div>

        </div>

      </div>

    <!-- PASSWORD -->
    <div class="settings-card mt-4">

        <h4 class="section-title mb-4">
          🔒 Change Password
        </h4>

        <div class="row g-4">

          <div class="col-md-4">

            <input
              type="password"
              class="modern-input"
              placeholder="Current Password"
              [(ngModel)]="passwordForm.currentPassword">

          </div>
          <div class="col-md-4">

            <input
              type="password"
              class="modern-input"
              placeholder="New Password"
              [(ngModel)]="passwordForm.newPassword">

          </div>

          <div class="col-md-4">

            <button
              class="save-btn w-100"
              (click)="changePassword()">

              Update Password

            </button>

          </div>

        </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="col-lg-4">

    <!-- LOGO -->
    <div class="settings-card text-center">

      <img
        [src]="settings.logo || 'assets/restaurant-placeholder.jpg'"
        class="restaurant-logo">

      <h4 class="mt-3">
        {{ settings.restaurantName || 'Restaurant Name' }}
      </h4>

      <p class="text-muted">
        Partner Restaurant
      </p>

      <label class="upload-btn mt-3">

        Upload Logo

        <input
          type="file"
          hidden
          (change)="onLogoSelect($event)">

      </label>

    </div>

    <!-- STORE STATUS -->
    <div class="settings-card mt-4">

      <div class="d-flex justify-content-between align-items-center">

        <div>

            <h5>
                Restaurant Status
              </h5>
  
              <p class="text-muted mb-0">
                Accept customer orders
              </p>
  
            </div>
  
            <!-- SWITCH -->
            <label class="switch">
  
              <input
                type="checkbox"
                [(ngModel)]="settings.isOpen">
  
              <span class="slider"></span>
  
            </label>

        </div>

        <div class="mt-3">

          <span
            class="status-pill"
            [ngClass]="{
              'open-pill': settings.isOpen,
              'closed-pill': !settings.isOpen
            }">

            {{ settings.isOpen ? 'Open Now' : 'Closed' }}

          </span>

        </div>

      </div>

      <!-- SAVE -->
      <button
        class="save-settings-btn w-100 mt-4"
        (click)="saveSettings()">

        Save Settings

      </button>

    </div>

  </div>

</div>
