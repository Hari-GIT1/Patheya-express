<div class="container-fluid">

    <h1 class="page-title mb-4">
      Analytics
    </h1>
  
    <!-- TOP CARDS -->
  
    <div class="row g-4 mb-4">
  
      <div class="col-md-3">
  
        <div class="dashboard-card">
  
          <small>Total Revenue</small>
  
          <h2 class="mt-3">
            ₹48,500
          </h2>
  
        </div>
  
      </div>
  
      <div class="col-md-3">
  
        <div class="dashboard-card">
  
          <small>Total Orders</small>
  
          <h2 class="mt-3">
            245
          </h2>
  
        </div>
  
      </div>
  
      <div class="col-md-3">
  
        <div class="dashboard-card">
  
          <small>Average Order</small>
  
          <h2 class="mt-3">
            ₹198
          </h2>
  
        </div>
  
      </div>
  
      <div class="col-md-3">
  
        <div class="dashboard-card">
  
          <small>Active Orders</small>
  
          <h2 class="mt-3">
            12
          </h2>
  
        </div>
  
      </div>
  
    </div>
  
    <!-- CHART -->
  
    <div class="dashboard-card">
  
      <h5 class="mb-4">
        Revenue Trend
      </h5>
  
      <canvas
        baseChart
        [data]="barChartData"
        [type]="'bar'">
      </canvas>
  
    </div>
  
  </div>
