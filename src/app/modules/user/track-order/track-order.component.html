<div class="container mt-4" *ngIf="order">

  <!-- HEADER -->
  <div class="card p-4 shadow-sm mb-4 text-center">

    <h4 class="fw-bold mb-2">
      Order #{{ order._id.slice(-6) }}
    </h4>

    <h5 class="text-success text-capitalize">
      {{ order.status.replace('_', ' ') }}
    </h5>

    <p class="text-muted mb-0">
      Estimated delivery by <strong>{{ eta }}</strong>
    </p>

  </div>
  <div class="card mt-4 p-3 shadow-sm">

    <h5 class="mb-3">Live Tracking 📍</h5>
  
    <google-map
    height="300px"
    width="100%"
    [center]="deliveryLocation"
    [zoom]="zoom">
  
    <!-- 🚴 Rider -->
    <map-marker
      [position]="deliveryLocation"
      label="🚴">
    </map-marker>
  
    <!-- 🏠 Destination -->
    <map-marker
      [position]="destination"
      label="🏠">
    </map-marker>
  
    <!-- 🔥 ROUTE LINE -->
    <map-directions-renderer
      *ngIf="directionsResult"
      [directions]="directionsResult">
    </map-directions-renderer>
  
  </google-map>
  
  </div>

  <!-- PROGRESS TRACKER -->
  <div class="card p-4 shadow-sm">

    <div class="d-flex justify-content-between align-items-center position-relative">
  
      <!-- BASE LINE -->
      <div class="progress-line"></div>
  
      <!-- 🔥 ACTIVE LINE -->
      <div class="progress-line-active"
           [style.width.%]="(getProgressIndex(order.status) / (steps.length - 1)) * 100">
      </div>
  
      <!-- STEPS -->
      <div *ngFor="let step of steps; let i = index"
           class="text-center step-box">
  
        <div class="step-circle"
             [ngClass]="{
               'active': i <= getProgressIndex(order.status),
               'current': i === getProgressIndex(order.status)
             }">
          {{ i + 1 }}
        </div>
  
        <small class="d-block mt-2">
          {{ step.label }}
        </small>
  
      </div>
  
    </div>
  
  </div>

</div>
