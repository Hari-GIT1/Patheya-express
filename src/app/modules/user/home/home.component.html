<!-- HERO -->
<div class="hero">
  <h1>Hungry? 🍔</h1>
  <p>Order from your favorite restaurants</p>

  <!-- 🔍 SEARCH -->
  <input
    type="text"
    class="form-control search-bar"
    placeholder="Search restaurants..."
    [(ngModel)]="searchTerm">
</div>

<!-- FILTERS -->
<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">

    <!-- 🍱 CATEGORY -->
    <div class="d-flex gap-2">
      <button class="btn"
              [ngClass]="selectedCategory === 'all' ? 'btn-dark' : 'btn-outline-dark'"
              (click)="selectedCategory = 'all'">
        All
      </button>

      <button class="btn"
              [ngClass]="selectedCategory === 'veg' ? 'btn-success' : 'btn-outline-success'"
              (click)="selectedCategory = 'veg'">
        Veg
      </button>

      <button class="btn"
              [ngClass]="selectedCategory === 'non-veg' ? 'btn-danger' : 'btn-outline-danger'"
              (click)="selectedCategory = 'non-veg'">
        Non-Veg
      </button>
    </div>

    <!-- 🔽 SORT -->
    <select class="form-select w-auto"
            [(ngModel)]="sortOption">
      <option value="">Sort</option>
      <option value="rating">Rating</option>
      <option value="delivery">Delivery Time</option>
    </select>

  </div>

  <!-- LOADING -->
  <div *ngIf="restaurants.length === 0" class="text-center mt-5">
    Loading restaurants...
  </div>

  <!-- RESTAURANTS -->
  <div class="row">

    <div class="col-md-4 mb-4"
         *ngFor="let r of filteredRestaurants">

      <div class="card restaurant-card"
           (click)="openRestaurant(r._id)">

        <img src="https://source.unsplash.com/400x300/?food,restaurant"
             class="card-img-top">

        <div class="card-body">

          <h5 class="fw-bold">{{ r.name }}</h5>

          <p class="text-muted mb-1">
            {{ r.cuisine }}
          </p>

          <div class="d-flex justify-content-between align-items-center">

            <!-- ⭐ Rating -->
            <div class="rating-box" *ngIf="r.avgRating > 0">
              ⭐ {{ r.avgRating | number:'1.1-1' }}
              <span class="text-muted small">
                ({{ r.totalRatings }})
              </span>
            </div>

            <!-- ⏱ Delivery -->
            <small class="text-muted">
              {{ r.deliveryTime || 30 }} mins
            </small>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
