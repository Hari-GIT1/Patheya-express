<ion-header>
  <ion-toolbar>
    <ion-title>Hungry? 🍔</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- 🔍 HERO + SEARCH -->
  <div class="ion-padding ion-text-center">
    <h2>Order from your favorite restaurants</h2>

    <ion-searchbar
      placeholder="Search restaurants..."
      [(ngModel)]="searchTerm">
    </ion-searchbar>
  </div>

  <!-- 🍱 CATEGORY FILTER -->
  <ion-segment [(ngModel)]="selectedCategory" class="ion-padding-horizontal">

    <ion-segment-button value="all">
      <ion-label>All</ion-label>
    </ion-segment-button>

    <ion-segment-button value="veg">
      <ion-label color="success">Veg</ion-label>
    </ion-segment-button>

    <ion-segment-button value="non-veg">
      <ion-label color="danger">Non-Veg</ion-label>
    </ion-segment-button>

  </ion-segment>

  <!-- 🔽 SORT -->
  <ion-item>
    <ion-label>Sort</ion-label>
    <ion-select [(ngModel)]="sortOption">
      <ion-select-option value="">None</ion-select-option>
      <ion-select-option value="rating">Rating</ion-select-option>
      <ion-select-option value="delivery">Delivery Time</ion-select-option>
    </ion-select>
  </ion-item>

  <!-- ⏳ LOADING -->
  <div *ngIf="restaurants.length === 0" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
    <p>Loading restaurants...</p>
  </div>

  <!-- 🍽 RESTAURANTS -->
  <ion-list>

    <ion-card *ngFor="let r of getFilteredRestaurants()"
              (click)="openRestaurant(r._id)">

      <img src="https://source.unsplash.com/400x300/?food,restaurant" />

      <ion-card-header>
        <ion-card-title>{{ r.name }}</ion-card-title>
        <ion-card-subtitle>{{ r.cuisine }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <div class="ion-flex ion-justify-content-between ion-align-items-center">

          <!-- ⭐ Rating -->
          <div *ngIf="r.avgRating > 0">
            ⭐ {{ r.avgRating | number:'1.1-1' }}
            <small>
              ({{ r.totalRatings }})
            </small>
          </div>

          <!-- ⏱ Delivery -->
          <small>
            {{ r.deliveryTime || 30 }} mins
          </small>

        </div>

      </ion-card-content>

    </ion-card>

  </ion-list>

</ion-content>
