<div class="container mt-4">

  <h3 class="fw-bold mb-3">Live Orders 🍽️</h3>

  <!-- 🔥 TABS -->
  <div class="tabs mb-3">
    <button class="tab"
            [class.active]="selectedTab === 'placed'"
            (click)="selectedTab = 'placed'">
      New ({{ getCount('placed') }})
    </button>

    <button class="tab"
            [class.active]="selectedTab === 'preparing'"
            (click)="selectedTab = 'preparing'">
      Preparing ({{ getCount('preparing') }})
    </button>

    <button class="tab"
            [class.active]="selectedTab === 'out_for_delivery'"
            (click)="selectedTab = 'out_for_delivery'">
      Out ({{ getCount('out_for_delivery') }})
    </button>

    <button class="tab"
            [class.active]="selectedTab === 'delivered'"
            (click)="selectedTab = 'delivered'">
      Delivered
    </button>
  </div>

  <!-- EMPTY -->
  <div *ngIf="filteredOrders.length === 0" class="text-muted text-center mt-5">
    No orders
  </div>

  <!-- ORDERS -->
  <div *ngFor="let order of filteredOrders"
       class="order-card"
       [ngClass]="{ 'new-order': isNew(order) }">

    <!-- HEADER -->
    <div class="d-flex justify-content-between">

      <div>
        <strong>#{{ order._id.slice(-6) }}</strong><br>
        <small>{{ order.createdAt | date:'shortTime' }}</small>
      </div>

      <span class="badge bg-dark text-capitalize">
        {{ order.status.replace('_', ' ') }}
      </span>

    </div>

    <hr>

    <!-- ITEMS -->
    <div *ngFor="let item of order.items">
      {{ item.name }} × {{ item.quantity }}
    </div>

    <hr>

    <!-- TOTAL -->
    <strong>₹ {{ order.total }}</strong>

    <!-- ⏱ TIMER -->
    <div *ngIf="timers[order._id]" class="timer">
      ⏱ {{ formatTime(timers[order._id]) }}
    </div>

    <!-- ACTIONS -->
    <div class="mt-3 d-flex gap-2 flex-wrap">

      <button class="btn btn-success btn-sm"
              *ngIf="order.status === 'placed'"
              (click)="updateStatus(order._id, 'accepted')">
        Accept
      </button>

      <button class="btn btn-danger btn-sm"
              *ngIf="order.status === 'placed'"
              (click)="updateStatus(order._id, 'cancelled')">
        Reject
      </button>

      <button class="btn btn-warning btn-sm"
              *ngIf="order.status === 'accepted'"
              (click)="updateStatus(order._id, 'preparing')">
        Preparing
      </button>

      <button class="btn btn-info btn-sm"
              *ngIf="order.status === 'preparing'"
              (click)="updateStatus(order._id, 'out_for_delivery')">
        Out
      </button>

      <button class="btn btn-dark btn-sm"
              *ngIf="order.status === 'out_for_delivery'"
              (click)="updateStatus(order._id, 'delivered')">
        Delivered
      </button>

    </div>

  </div>

</div>
