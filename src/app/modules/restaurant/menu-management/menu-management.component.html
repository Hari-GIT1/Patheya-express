<div class="container mt-4">

  <!-- 🧾 ADD / EDIT FORM -->
  <div class="card p-3 mb-4">

    <h5 class="mb-3">
      {{ editingItemId ? 'Edit Item ✏️' : 'Add New Item 🍽️' }}
    </h5>

    <form [formGroup]="form">

      <!-- NAME -->
      <input class="form-control mb-2"
             placeholder="Item name"
             formControlName="name">

      <!-- PRICE -->
      <input class="form-control mb-2"
             type="number"
             placeholder="Price"
             formControlName="price">

      <!-- CATEGORY -->
      <select class="form-control mb-2"
              formControlName="category">
        <option value="veg">Veg</option>
        <option value="non-veg">Non Veg</option>
      </select>

      <!-- IMAGE -->
      <input type="file"
             class="form-control mb-2"
             (change)="onFileSelect($event)">

      <!-- BUTTON -->
      <button class="btn btn-primary w-100"
              (click)="addItem()"
              [disabled]="form.invalid">

        {{ editingItemId ? 'Update Item' : 'Add Item' }}
      </button>

    </form>
  </div>

  <!-- 🔍 SEARCH -->
  <input 
    type="text"
    class="form-control mb-3"
    placeholder="Search items..."
    [(ngModel)]="searchText">

  <!-- 🍱 FILTER -->
  <div class="mb-3 d-flex gap-2">
    <button class="btn"
            [ngClass]="selectedCategory === 'all' ? 'btn-dark' : 'btn-outline-dark'"
            (click)="selectedCategory = 'all'">All</button>

    <button class="btn"
            [ngClass]="selectedCategory === 'veg' ? 'btn-success' : 'btn-outline-success'"
            (click)="selectedCategory = 'veg'">Veg</button>

    <button class="btn"
            [ngClass]="selectedCategory === 'non-veg' ? 'btn-danger' : 'btn-outline-danger'"
            (click)="selectedCategory = 'non-veg'">Non-Veg</button>
  </div>

  <!-- 🔽 SORT -->
  <select class="form-select mb-4" [(ngModel)]="sortOption">
    <option value="">Sort</option>
    <option value="priceLow">Price ↑</option>
    <option value="priceHigh">Price ↓</option>
    <option value="name">Name</option>
  </select>

  <!-- 🍔 MENU -->
  <div class="row">

    <div class="col-md-4 mb-4"
         *ngFor="let item of filteredMenuItems">

      <div class="card shadow-sm h-100 menu-card">

        <!-- IMAGE -->
        <img *ngIf="item.image"
             [src]="'http://localhost:3000/uploads/' + item.image"
             class="card-img-top">

        <div class="card-body d-flex flex-column">

          <h5>{{ item.name }}</h5>

          <p>₹ {{ item.price }}</p>

          <span [ngClass]="{
            'text-success': item.category === 'veg',
            'text-danger': item.category === 'non-veg'
          }">
            ● {{ item.category }}
          </span>

          <!-- ACTIONS -->
          <div class="mt-auto d-flex justify-content-between">

            <button class="btn btn-sm btn-primary"
                    (click)="editItem(item)">
              ✏️
            </button>

            <button class="btn btn-sm btn-danger"
                    (click)="deleteItem(item._id)">
              🗑
            </button>

          </div>

        </div>
      </div>

    </div>

  </div>

</div>
